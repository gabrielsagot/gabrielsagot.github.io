<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Selection</title>
    <meta property="og:title" content="Gabriel Sagot — Portfolio">
    <meta property="og:image" content="../Portfolio_pro/assets/favicon.png">
    <link rel="icon" type="image/png" href="../Portfolio_pro/assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=Space+Grotesk:wght@300;500&display=swap"
        rel="stylesheet">

    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.11.6/build/spline-viewer.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="loader-screen" id="loader">
        <div class="loader-content">
            <div class="counter" id="counter">0</div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="bar"></div>
            </div>
            <div class="status-text">Initialisation...</div>
        </div>
    </div>

    <main class="ui-container" id="ui">

        <div class="identity-block">
            <span class="role-tag">Hub</span>
            <h1>Gabriel<br>Sagot</h1>
        </div>

        <div class="selection-block">
            <div class="cta-phrase">Quelle direction souhaitez-vous prendre ?</div>

            <nav>
                <a href="../Portfolio_pro/index.html" class="card pro" style="margin-bottom: 1rem;">
                    <div class="card-text">
                        <h2>Portfolio universitaire</h2>
                        <p>Parcours, Compétences & Rigueur</p>
                    </div>
                    <div class="icon-circle">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" fill="none">
                            <path d="M5 12H19M19 12L12 5M19 12L12 19" />
                        </svg>
                    </div>
                </a>
                
                <a href="../Portfolio_pro/assets/SAGOT GABRIEL CV.pdf" target="_blank" download class="card cv">
                    <div class="card-text">
                        <h2>Télécharger mon CV</h2>
                        <p>Expériences & Formations</p>
                    </div>
                    <div class="icon-circle">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </div>
                </a>
            </nav>
        </div>
    </main>

    <spline-viewer id="spline" loading-anim-type="none"
        url="https://prod.spline.design/fpycavKQQi6wxnXg/scene.splinecode">
    </spline-viewer>

    <script src="script.js"></script>
</body>

</html>
